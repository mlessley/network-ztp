services:
  ztp-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: ["uv", "run", "uvicorn", "api.main:create_app", "--factory",
              "--host", "0.0.0.0", "--port", "8000"]
    environment:
      ZTP_USE_MOCK: "true"
      ZTP_ENV: development
      LOG_LEVEL: DEBUG

  ztp-worker:
    environment:
      ZTP_USE_MOCK: "true"
      ZTP_ENV: development
      LOG_LEVEL: DEBUG

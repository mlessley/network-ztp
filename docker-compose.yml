services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.0
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
      PROMETHEUS_ENDPOINT: "0.0.0.0:8001"
    ports:
      - "7233:7233"
      - "8001:8001"
    dns:
      - 127.0.0.11
    healthcheck:
      test: ["CMD-SHELL", "nc -z \"$(hostname -i | awk '{print $1}')\" 7233 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  temporal-ui:
    image: temporalio/ui:2.31.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"

  ztp-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
      OTLP_ENDPOINT: http://tempo:4317
      METRICS_PORT: "9091"
    ports:
      - "9091:9091"

  ztp-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
      OTLP_ENDPOINT: http://tempo:4317
    ports:
      - "8000:8000"

  prometheus:
    build:
      context: .
      dockerfile: docker/Dockerfile.prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  tempo:
    build:
      context: .
      dockerfile: docker/Dockerfile.tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4317:4317"
      - "3200:3200"

  loki:
    image: grafana/loki:3.2.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    build:
      context: .
      dockerfile: docker/Dockerfile.promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml

  grafana:
    build:
      context: .
      dockerfile: docker/Dockerfile.grafana
    depends_on:
      - prometheus
      - tempo
      - loki
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"

services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
      POSTGRES_DB: temporal
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.0
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgresql
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      retries: 15

  temporal-ui:
    image: temporalio/ui:2.31.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"

  ztp-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
      OTLP_ENDPOINT: http://tempo:4317
      METRICS_PORT: "9091"
    ports:
      - "9091:9091"

  ztp-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
      OTLP_ENDPOINT: http://tempo:4317
      METRICS_PORT: "9090"
    ports:
      - "8000:8000"
      - "9090:9090"

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./config/observability/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  tempo:
    image: grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/observability/tempo.yaml:/etc/tempo.yaml
    ports:
      - "4317:4317"
      - "3200:3200"

  loki:
    image: grafana/loki:3.2.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.2.0
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/observability/promtail/config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      - prometheus
      - tempo
      - loki
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./config/observability/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
